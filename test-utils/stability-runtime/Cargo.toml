[package]
name = "stability-test-runtime"
version = "1.0.0"
authors = ["Stability Solutions"]
edition = "2021"
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
build = "build.rs"
publish = false

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]


[dependencies]
beefy-primitives = { workspace = true, package = "sp-beefy" }
beefy-merkle-tree = { workspace = true }
sp-application-crypto = { workspace = true }
sp-consensus-aura = { workspace = true }
sp-consensus-babe = { workspace = true }
sp-block-builder = { workspace = true }
codec = { package = "parity-scale-codec", workspace = true, features = ["derive"] }
scale-info = { workspace = true, features = ["derive"] }
sp-inherents = { workspace = true }
sp-keyring = { workspace = true, optional = true }
memory-db = { workspace = true }
sp-offchain = { workspace = true }
sp-core = { workspace = true }
sp-std ={ workspace = true }
sp-runtime-interface = { workspace = true }
sp-io = { workspace = true }
frame-support = { workspace = true }
sp-version = { workspace = true }
sp-session = { workspace = true }
sp-api = { workspace = true }
sp-runtime = { workspace = true }
pallet-babe = { workspace = true }
frame-system = { workspace = true }
frame-system-rpc-runtime-api = { workspace = true }
pallet-timestamp = { workspace = true }
sp-finality-grandpa = { workspace = true }
sp-trie = { workspace = true }
sp-transaction-pool = { workspace = true }
trie-db = { workspace = true }
sc-service = { workspace=true, optional = true, features = ["test-helpers"] }
sp-state-machine = { workspace = true }
sp-externalities = { workspace = true }
stbl-primitives-fee-compatible-api = { workspace = true }
# 3rd party
cfg-if = { workspace = true }
log = { workspace = true }
serde = { workspace = true, optional = true, features = ["derive"] }
stbl-core-primitives = { workspace = true }

[dev-dependencies]
sc-block-builder = { workspace = true }
sc-executor = { workspace = true }
sp-consensus = { workspace = true }
stability-test-runtime-client = { workspace = true }
futures = { workspace = true }

[build-dependencies]
substrate-wasm-builder = { workspace = true }

[features]
default = [
	"std",
]
std = [
	"beefy-primitives/std",
	"beefy-merkle-tree/std",
	"sp-application-crypto/std",
	"sp-consensus-aura/std",
	"sp-consensus-babe/std",
	"sp-block-builder/std",
	"codec/std",
	"scale-info/std",
	"sp-inherents/std",
	"sp-keyring",
	"log/std",
	"memory-db/std",
	"sp-offchain/std",
	"sp-core/std",
	"sp-core/std",
	"sp-std/std",
	"sp-runtime-interface/std",
	"sp-io/std",
	"frame-support/std",
	"sp-version/std",
	"serde",
	"sp-session/std",
	"sp-api/std",
	"sp-runtime/std",
	"sp-externalities/std",
	"sp-state-machine/std",
	"pallet-babe/std",
	"frame-system-rpc-runtime-api/std",
	"frame-system/std",
	"pallet-timestamp/std",
	"sc-service",
	"sp-finality-grandpa/std",
	"sp-trie/std",
	"sp-transaction-pool/std",
	"trie-db/std",
	"stbl-core-primitives/std",

]
# Special feature to disable logging
disable-logging = [ "sp-api/disable-logging" ]
