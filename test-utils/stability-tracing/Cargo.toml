[package]
name = "stability-sp-tracing"
version = "6.0.0"
authors = ["Stability Solutions"]
edition = "2021"
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
publish = false


[package.metadata.docs.rs]
# let's default to wasm32
default-target = "wasm32-unknown-unknown"
# with the tracing enabled
features = ["with-tracing"]
# allowing for linux-gnu here, too, allows for `std` to show up as well
targets = ["x86_64-unknown-linux-gnu", "wasm32-unknown-unknown"]

[dependencies]
sp-std = { workspace = true }
codec = { default-features = false, features = ["derive"], workspace = true }
tracing = { workspace = true }
tracing-core = { workspace = true }
tracing-subscriber = { workspace = true, optional = true }

[features]
default = ["std"]
with-tracing = ["codec/derive", "codec/full"]
std = [
	"with-tracing",
	"tracing/std",
	"tracing-core/std",
	"codec/std",
	"sp-std/std",
	"tracing-subscriber",
]
