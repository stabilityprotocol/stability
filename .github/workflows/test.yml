name: Cargo Test

on:
  pull_request:
    branches:
      - main
env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Install dependencies for compiling
        run: |
          sudo apt update
          sudo apt install protobuf-compiler -y
      - name: Run tests
        run: cargo test --release --verbose
